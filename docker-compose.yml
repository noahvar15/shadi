services:

  # ─── Inference: vLLM (optional LoRA experiments — not used by agents after ADR-004) ─
  # Start with: docker compose --profile vllm-lora up -d vllm
  # Preflight (host): ./scripts/check_vllm_model_base.sh
  vllm:
    profiles:
      - vllm-lora
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ${MODEL_BASE_PATH:-/models/meditron-70b}:/models/base:ro
      - ${LORA_ADAPTERS_PATH:-/models/adapters}:/models/adapters:ro
    command: >
      --model /models/base
      --enable-lora
      --lora-modules
        cardiology=/models/adapters/cardiology
        neurology=/models/adapters/neurology
        pulmonology=/models/adapters/pulmonology
        toxicology=/models/adapters/toxicology
      --max-model-len 4096
      --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─── Inference: Ollama (all chat + embed models, including Meditron for specialists) ─
  # Serves: meditron:70b (specialists + claim eval, ADR-004), alibayram/medgemma:27b,
  # qwen2.5:7b, nomic-embed-text, phi4:14b, deepseek-r1:32b. OpenAI-compatible /v1.
  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shadi
      POSTGRES_USER: shadi
      POSTGRES_PASSWORD: shadi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Task Queue / Pub-Sub ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - path: .env
        required: false
      - path: .env.demo
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://shadi:shadi@postgres:5432/shadi
      - REDIS_URL=redis://redis:6379/0
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-before-production}
      - MOCK_LLM=${MOCK_LLM:-true}
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      # Model assignments — see ADR-002, ADR-004
      - MEDITRON_MODEL=${MEDITRON_MODEL:-meditron:70b}
      - IMAGE_MODEL=alibayram/medgemma:27b
      - INTAKE_MODEL=qwen2.5:7b
      - EVIDENCE_EMBED_MODEL=nomic-embed-text
      - SAFETY_MODEL=phi4:14b
      - ORCHESTRATOR_MODEL=deepseek-r1:32b
      - LLM_HTTP_TIMEOUT_SECONDS=${LLM_HTTP_TIMEOUT_SECONDS:-600}
      - SPECIALISTS_PARALLEL=${SPECIALISTS_PARALLEL:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ${EVIDENCE_INDEX_PATH:-/data/evidence_index}:/data/evidence_index:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── arq worker (diagnostic pipeline jobs) ─────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: arq tasks.worker.WorkerSettings
    env_file:
      - path: .env
        required: false
      - path: .env.demo
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://shadi:shadi@postgres:5432/shadi
      - REDIS_URL=redis://redis:6379/0
      - API_SECRET_KEY=${API_SECRET_KEY:-dev-local-only-set-a-long-random-secret}
      - MOCK_LLM=${MOCK_LLM:-true}
      - INTAKE_QUEUE=${INTAKE_QUEUE:-arq:intake}
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - MEDITRON_MODEL=${MEDITRON_MODEL:-meditron:70b}
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-deepseek-r1:32b}
      - SAFETY_MODEL=${SAFETY_MODEL:-phi4:14b}
      - EVIDENCE_EMBED_MODEL=${EVIDENCE_EMBED_MODEL:-nomic-embed-text}
      - LLM_HTTP_TIMEOUT_SECONDS=${LLM_HTTP_TIMEOUT_SECONDS:-600}
      - SPECIALISTS_PARALLEL=${SPECIALISTS_PARALLEL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import tasks.worker'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── Physician Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
